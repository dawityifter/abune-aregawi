spring:
  application:
     name: abune-aregawi-backend-java
  profiles:
     active: local
  datasource:
     # Database Config - will use environment variables if available
     # Prepended jdbc: prefix to ensure compatibility
     url: jdbc:postgresql://localhost:5432/abune_aregawi_db
     username: dawit
     password:
     driver-class-name: org.postgresql.Driver
  jpa:
     hibernate:
        ddl-auto: update
     show-sql: false
     properties:
        hibernate:
           format_sql: true
           dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    group:
      liveness:
        include: livenessState
      readiness:
        include: readinessState,db,diskSpace,firebase
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

spring.cache:
  type: caffeine

cache:
  specs:
    members:
      ttl: 300        # seconds
      max-size: 500
    member-search:
      ttl: 60
      max-size: 200
    outreach:
      ttl: 120
      max-size: 200
    titles:
      ttl: 3600
      max-size: 50

app:
  # Demo mode (for testing without real Firebase tokens)
  enable-demo-mode: ${APP_ENABLE_DEMO_MODE:false}
  demo-token: MAGIC_DEMO_TOKEN

logging:
  level:
     church:
        abunearegawi: WARN
     org:
        springframework:
           security: ERROR
